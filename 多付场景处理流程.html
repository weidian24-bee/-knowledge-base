<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多付场景处理流程</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .slide {
    width: 1280px; height: 720px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px; padding: 48px 56px; position: relative; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .slide::before {
    content: ''; position: absolute; top: -200px; right: -200px;
    width: 500px; height: 500px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .slide::after {
    content: ''; position: absolute; bottom: -150px; left: -100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }
  h1 { color: #fff; font-size: 36px; font-weight: 700; text-align: center; margin-bottom: 6px; position: relative; z-index: 1; }
  .subtitle { color: rgba(255,255,255,0.7); font-size: 16px; text-align: center; margin-bottom: 36px; position: relative; z-index: 1; }
  .flow-container { display: flex; gap: 28px; position: relative; z-index: 1; }

  /* 场景卡片 */
  .scenario {
    flex: 1; background: rgba(255,255,255,0.95); border-radius: 16px;
    padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .scenario-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .scenario-icon {
    width: 40px; height: 40px; border-radius: 10px; display: flex;
    align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .scenario-icon.green { background: #d4edda; }
  .scenario-icon.orange { background: #fff3cd; }
  .scenario-title { font-size: 20px; font-weight: 700; color: #1a1a2e; }
  .scenario-desc { font-size: 13px; color: #888; margin-bottom: 18px; padding-left: 50px; margin-top: -8px; }

  /* 步骤 */
  .steps { display: flex; flex-direction: column; gap: 10px; padding-left: 4px; }
  .step {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    background: #f8f9ff; border-radius: 10px; border-left: 4px solid;
    transition: transform 0.2s;
  }
  .step:hover { transform: translateX(4px); }
  .step.green { border-color: #28a745; }
  .step.blue { border-color: #007bff; }
  .step.red { border-color: #dc3545; }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .step-num.green { background: #28a745; }
  .step-num.blue { background: #007bff; }
  .step-num.red { background: #dc3545; }
  .step-text { font-size: 14px; color: #333; font-weight: 500; }
  .step-text .highlight { color: #007bff; font-weight: 700; }
  .step-text .highlight-red { color: #dc3545; font-weight: 700; }

  /* 分支 */
  .branches { display: flex; gap: 14px; margin-top: 4px; }
  .branch { flex: 1; }
  .branch-label {
    text-align: center; padding: 8px 12px; border-radius: 8px;
    font-size: 14px; font-weight: 700; margin-bottom: 10px;
  }
  .branch-label.blue { background: #e3f2fd; color: #1565c0; }
  .branch-label.red { background: #fce4ec; color: #c62828; }
  .branch-label .emoji { margin-right: 4px; }

  /* 箭头连接 */
  .arrow-down {
    text-align: center; color: #bbb; font-size: 18px; margin: 2px 0;
  }
</style>
</head>
<body>
<div class="slide">
  <h1>💰 多付场景处理流程</h1>
  <p class="subtitle">客服标准操作指引</p>

  <div class="flow-container">
    <!-- 场景一 -->
    <div class="scenario">
      <div class="scenario-header">
        <div class="scenario-icon green">✅</div>
        <div class="scenario-title">场景一：一眼能确认多付</div>
      </div>
      <div class="scenario-desc">订单重复支付</div>
      <div class="steps">
        <div class="step green">
          <div class="step-num green">1</div>
          <div class="step-text">核对多付订单</div>
        </div>
        <div class="arrow-down">↓</div>
        <div class="step green">
          <div class="step-num green">2</div>
          <div class="step-text">操作<span class="highlight">退款</span></div>
        </div>
        <div class="arrow-down">↓</div>
        <div class="step green">
          <div class="step-num green">3</div>
          <div class="step-text">编辑话术 → 上报班长</div>
        </div>
        <div class="arrow-down">↓</div>
        <div class="step green">
          <div class="step-num green">4</div>
          <div class="step-text">班长同步商家</div>
        </div>
      </div>
    </div>

    <!-- 场景二 -->
    <div class="scenario">
      <div class="scenario-header">
        <div class="scenario-icon orange">⚠️</div>
        <div class="scenario-title">场景二：无法确认多付</div>
      </div>
      <div class="scenario-desc">分配时已多付 / 多件商品不确认 / 二次进店反馈</div>

      <div class="branches">
        <!-- 愿意等 -->
        <div class="branch">
          <div class="branch-label blue"><span class="emoji">😊</span>顾客愿意等</div>
          <div class="steps">
            <div class="step blue">
              <div class="step-num blue">1</div>
              <div class="step-text">引导顾客离店</div>
            </div>
            <div class="arrow-down">↓</div>
            <div class="step blue">
              <div class="step-num blue">2</div>
              <div class="step-text">打标<span class="highlight">「疑似多付」</span></div>
            </div>
            <div class="arrow-down">↓</div>
            <div class="step blue">
              <div class="step-num blue">3</div>
              <div class="step-text">等待二线处理</div>
            </div>
          </div>
        </div>

        <!-- 不愿意等 -->
        <div class="branch">
          <div class="branch-label red"><span class="emoji">😤</span>顾客不愿意等</div>
          <div class="steps">
            <div class="step red">
              <div class="step-num red">1</div>
              <div class="step-text">告知<span class="highlight-red">转二线</span>处理</div>
            </div>
            <div class="arrow-down">↓</div>
            <div class="step red">
              <div class="step-num red">2</div>
              <div class="step-text">群内转交二线专员</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
