<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周黑鸭值守知识库</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 登录页 -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-logo">🦆</div>
    <h1>周黑鸭值守知识库</h1>
    <p class="login-subtitle">24小时值守团队专用</p>
    <div class="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPwd" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-primary btn-full" onclick="doLogin()">登 录</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- 主界面 -->
<div id="mainApp" class="main-app" style="display:none;">
  <!-- 顶部导航 -->
  <header class="top-bar">
    <div class="top-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <span class="brand">🦆 周黑鸭值守知识库</span>
    </div>
    <div class="top-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="btn-sm btn-outline" onclick="doLogout()">退出</button>
    </div>
  </header>

  <div class="app-body">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>

    <!-- 内容区 -->
    <main class="content" id="contentArea">
      <!-- 动态渲染 -->
    </main>
  </div>
</div>

<!-- 后台管理弹窗 -->
<div class="modal-overlay" id="adminModal">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="modalTitle">后台管理</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- 编辑文章弹窗 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-panel modal-wide">
    <div class="modal-header">
      <h2 id="editModalTitle">编辑文章</h2>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body" id="editModalBody"></div>
  </div>
</div>

<!-- 版本历史弹窗 -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-panel">
    <div class="modal-header">
      <h2>版本历史</h2>
      <button class="modal-close" onclick="closeHistoryModal()">&times;</button>
    </div>
    <div class="modal-body" id="historyModalBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
